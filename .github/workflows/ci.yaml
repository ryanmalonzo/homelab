name: Validate Configuration

on:
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
    env:
      AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      TF_VAR_cloudflare_zone_id: ${{ vars.TF_VAR_CLOUDFLARE_ZONE_ID }}
      TF_VAR_tailscale_ip: ${{ vars.TF_VAR_TAILSCALE_IP }}
    steps:
      - uses: actions/checkout@v7

      - name: Detect changes
        uses: dorny/paths-filter@v4
        id: changes
        with:
          filters: |
            terraform:
              - 'terraform/**'

      - name: Setup Terraform
        if: steps.changes.outputs.terraform == 'true'
        uses: hashicorp/setup-terraform@v4

      - name: Check Terraform formatting
        if: steps.changes.outputs.terraform == 'true'
        working-directory: terraform
        run: terraform fmt -check -recursive

      - name: Terraform init
        if: steps.changes.outputs.terraform == 'true'
        working-directory: terraform
        run: terraform init

      - name: Terraform validate
        if: steps.changes.outputs.terraform == 'true'
        working-directory: terraform
        run: terraform validate

      - name: Terraform plan
        if: steps.changes.outputs.terraform == 'true'
        id: plan
        working-directory: terraform
        run: terraform plan -no-color

      - name: Comment plan on PR
        if: steps.changes.outputs.terraform == 'true' && !contains(steps.plan.outputs.stdout, 'No changes.')
        env:
          GH_TOKEN: ${{ github.token }}
          PLAN: ${{ steps.plan.outputs.stdout }}
        run: |
          gh pr comment ${{ github.event.pull_request.number }} \
            --body "$(printf '## Terraform Plan\n```\n%s\n```\n' "$PLAN")" \
            --edit-last \
            --create-if-none
