apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: chaldea
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/ryanmalonzo/homelab.git
    targetRevision: HEAD
    path: k8s/manifests
    directory:
      recurse: true
  destination:
    server: https://kubernetes.default.svc
    namespace: default
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
