apiVersion: apps/v1
kind: Deployment
metadata:
  name: seerr
spec:
  replicas: 1
  selector:
    matchLabels:
      app: seerr
  template:
    metadata:
      labels:
        app: seerr
    spec:
      initContainers:
        - name: fix-permissions
          image: busybox
          command: ["sh", "-c", "chown -R 1000:1000 /config"]
          volumeMounts:
            - name: config
              mountPath: /config
          securityContext:
            runAsUser: 0
            runAsGroup: 0
      containers:
        - name: seerr
          image: ghcr.io/seerr-team/seerr:v3.3.0
          ports:
            - containerPort: 5055
          volumeMounts:
            - name: config
              mountPath: /config
          env:
            - name: TZ
              value: "Europe/Paris"
      volumes:
        - name: config
          persistentVolumeClaim:
            claimName: seerr-config
      securityContext:
        runAsUser: 1000
        runAsGroup: 1000
