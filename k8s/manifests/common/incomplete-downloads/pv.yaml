apiVersion: v1
kind: PersistentVolume
metadata:
  name: incomplete-downloads
  labels:
    name: incomplete-downloads
spec:
  capacity:
    storage: 50Gi
  accessModes:
    - ReadWriteOnce
  hostPath:
    path: "/srv/incomplete-downloads"
  persistentVolumeReclaimPolicy: Retain
  storageClassName: ""
