apiVersion: v1
kind: PersistentVolume
metadata:
  name: radarr-regular-config
  labels:
    name: radarr-regular-config
spec:
  capacity:
    storage: 1Gi
  accessModes:
    - ReadWriteOnce
  hostPath:
    path: "/srv/radarr-regular/config"
  persistentVolumeReclaimPolicy: Retain
  storageClassName: ""
