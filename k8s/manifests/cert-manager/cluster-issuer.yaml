apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: zerossl-cloudflare-dns01
spec:
  acme:
    server: https://acme.zerossl.com/v2/DV90
    email: ren@chaldea.dev
    externalAccountBinding:
      keyID: vzP5A2LG89QwopgAAv5QMA
      keySecretRef:
        name: zerossl-eab-hmac
        key: zerossl-eab-hmac
    privateKeySecretRef:
      name: zerossl-cloudflare-dns01-account-key
    solvers:
      - dns01:
          cloudflare:
            apiTokenSecretRef:
              name: cloudflare-api-token
              key: cloudflare-api-token
